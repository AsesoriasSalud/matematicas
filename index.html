<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathPro UVM — Cálculo y Álgebra Lineal</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e18;
  --surface: #151824;
  --surface2: #1e2235;
  --border: #272d45;
  --accent: #6c63ff;
  --accent2: #ff6b9d;
  --green: #3ddc84;
  --red: #ff5c5c;
  --yellow: #ffd166;
  --text: #e4e8f7;
  --muted: #7b82a8;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0c0e18 0%, #151030 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 20px 24px;
  text-align: center;
}
.header-badge {
  display: inline-block;
  background: rgba(108,99,255,.15);
  border: 1px solid rgba(108,99,255,.4);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.header h1 {
  font-size: clamp(22px,5vw,38px);
  font-weight: 700;
  background: linear-gradient(135deg,#fff 30%,var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.15;
}
.header p { color: var(--muted); margin-top: 8px; font-size: 14px; }

/* ── Scores ── */
.score-bar {
  display: flex; justify-content: center; gap: 12px;
  padding: 16px 20px; flex-wrap: wrap;
}
.score-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; padding: 7px 18px;
  font-size: 13px; font-weight: 600;
}
.dot { width:8px; height:8px; border-radius:50%; }
.dg{background:var(--green)} .dr{background:var(--red)} .da{background:var(--accent)}

/* ── Topic Tabs ── */
.topic-wrap {
  max-width: 780px; margin: 0 auto; padding: 0 16px 16px;
}
.topic-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; padding-top: 20px;
}
.topic-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.topic-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); border-radius: 10px;
  padding: 8px 16px; font-family: inherit;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.topic-btn:hover { border-color: var(--accent); color: var(--text); }
.topic-btn.active {
  background: rgba(108,99,255,.18);
  border-color: var(--accent); color: #fff;
}

/* ── Exercise Card ── */
.card-wrap { max-width: 780px; margin: 0 auto; padding: 0 16px 16px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 24px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top:0;left:0;right:0; height:3px;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
}
.ex-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
}
.ex-question {
  font-size: clamp(17px,3.5vw,24px);
  font-weight: 600; line-height: 1.6; color: #fff;
  margin-bottom: 24px; min-height: 60px;
}
.input-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.answer-input {
  flex:1; min-width:120px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color:#fff;
  font-family:'JetBrains Mono',monospace; font-size:17px;
  padding: 11px 16px; outline:none; transition: border-color .2s;
}
.answer-input:focus { border-color: var(--accent); }
.answer-input.correct { border-color:var(--green); background:rgba(61,220,132,.07); }
.answer-input.wrong   { border-color:var(--red);   background:rgba(255,92,92,.07); }
.btn {
  background: var(--accent); color:#fff; border:none;
  border-radius:10px; padding:11px 22px;
  font-family:inherit; font-size:14px; font-weight:700;
  cursor:pointer; transition:opacity .2s, transform .1s; white-space:nowrap;
}
.btn:hover{opacity:.85} .btn:active{transform:scale(.97)}
.btn.secondary {
  background:var(--surface2); border:1.5px solid var(--border); color:var(--text);
}
.btn.hint-btn { background:rgba(255,209,102,.12); border:1.5px solid rgba(255,209,102,.3); color:var(--yellow); }

/* ── Feedback ── */
.feedback {
  margin-top:20px; border-radius:12px; padding:20px;
  display:none; animation: fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.feedback.show-correct { display:block; background:rgba(61,220,132,.08); border:1px solid rgba(61,220,132,.25); }
.feedback.show-wrong   { display:block; background:rgba(255,92,92,.07);  border:1px solid rgba(255,92,92,.2); }
.fb-title { font-weight:700; font-size:15px; margin-bottom:14px; }
.show-correct .fb-title { color:var(--green); }
.show-wrong   .fb-title { color:var(--red); }

.steps-list { display:flex; flex-direction:column; gap:10px; }
.step {
  display:flex; gap:12px; align-items:flex-start;
  background:rgba(255,255,255,.03); border-radius:8px; padding:10px 12px;
}
.step-num {
  background:rgba(108,99,255,.2); border:1px solid rgba(108,99,255,.35);
  border-radius:6px; padding:2px 8px;
  font-size:11px; font-weight:700; color:var(--accent);
  flex-shrink:0; margin-top:3px; font-family:'JetBrains Mono',monospace;
}
.step-text { font-size:14px; color:var(--text); line-height:1.6; }

.btn-row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }

/* ── Progress ── */
.progress-wrap { max-width:780px; margin:0 auto; padding:0 16px 14px; }
.progress-label {
  display:flex; justify-content:space-between;
  font-size:12px; color:var(--muted); font-weight:600; margin-bottom:6px;
}
.progress-bar { height:4px; background:var(--surface2); border-radius:999px; overflow:hidden; }
.progress-fill {
  height:100%; border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .4s ease;
}

/* ── History ── */
.history-wrap { max-width:780px; margin:0 auto; padding:16px; }
.history-label {
  font-size:11px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.history-list { display:flex; flex-direction:column; gap:7px; }
.hist-item {
  display:flex; align-items:center; gap:10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:9px 14px; font-size:13px;
}
.hist-q { flex:1; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hist-a { font-family:'JetBrains Mono',monospace; font-weight:700; }
.hist-item.hc .hist-a { color:var(--green); }
.hist-item.hw .hist-a { color:var(--red); }
.empty-msg { color:var(--muted); font-size:13px; text-align:center; padding:20px; }

/* ── Responsive ── */
@media(max-width:480px){
  .card{padding:20px 16px;}
  .answer-input{font-size:15px;}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-badge">UVM · Ingeniería Biomédica</div>
  <h1>Cálculo &amp; Álgebra Lineal</h1>
  <p>Practica los temas de tu temario con soluciones paso a paso</p>
</div>

<!-- Scores -->
<div class="score-bar">
  <div class="score-pill"><span class="dot dg"></span>Aciertos: <strong id="sc">0</strong></div>
  <div class="score-pill"><span class="dot dr"></span>Errores: <strong id="sw">0</strong></div>
  <div class="score-pill"><span class="dot da"></span>Total: <strong id="st">0</strong></div>
</div>

<!-- Topic selector -->
<div class="topic-wrap">
  <div class="topic-label">Elige un tema</div>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-label"><span>Progreso de sesión</span><span id="prog-txt">0 / 10</span></div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<!-- Exercise -->
<div class="card-wrap">
  <div class="card" id="card">
    <div class="ex-tag" id="ex-tag">—</div>
    <div class="ex-question" id="ex-q">Selecciona un tema para comenzar.</div>
    <div class="input-row">
      <input class="answer-input" id="ans" type="text" placeholder="Tu respuesta..." autocomplete="off" disabled />
      <button class="btn" id="btn-check" onclick="checkAns()" disabled>Verificar</button>
    </div>
    <div class="feedback" id="fb">
      <div class="fb-title" id="fb-title"></div>
      <div class="steps-list" id="fb-steps"></div>
    </div>
    <div class="btn-row" id="btn-row" style="display:none">
      <button class="btn" onclick="nextEx()">Siguiente →</button>
      <button class="btn hint-btn" onclick="showSolution()">💡 Ver solución</button>
    </div>
  </div>
</div>

<!-- History -->
<div class="history-wrap">
  <div class="history-label">Historial</div>
  <div class="history-list" id="hist-list">
    <div class="empty-msg">Aún no has respondido ningún ejercicio.</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  BANCO DE EJERCICIOS (basado en temarios UVM)
// ══════════════════════════════════════════════════════
const TOPICS = {

  // ── CÁLCULO ─────────────────────────────────────────

  "Funciones y Variables": [
    {
      tag: "Funciones · Evaluación",
      q: "Si $f(x) = 3x^2 - 2x + 1$, calcula $f(2)$",
      a: "9", alt: [],
      steps: [
        "Sustituimos $x = 2$ en $f(x) = 3x^2 - 2x + 1$",
        "$f(2) = 3(2)^2 - 2(2) + 1$",
        "$= 3(4) - 4 + 1$",
        "$= 12 - 4 + 1 = \\boxed{9}$"
      ]
    },
    {
      tag: "Funciones · Composición",
      q: "Si $f(x)=2x+1$ y $g(x)=x^2$, calcula $(f \\circ g)(3)$",
      a: "19", alt: [],
      steps: [
        "$(f \\circ g)(x) = f(g(x))$",
        "Primero: $g(3) = 3^2 = 9$",
        "Luego: $f(9) = 2(9)+1 = 18+1$",
        "$= \\boxed{19}$"
      ]
    },
    {
      tag: "Funciones · Logaritmos",
      q: "Calcula $\\log_2(32)$",
      a: "5", alt: [],
      steps: [
        "Buscamos el exponente $n$ tal que $2^n = 32$",
        "$2^1=2,\\; 2^2=4,\\; 2^3=8,\\; 2^4=16,\\; 2^5=32$",
        "Por tanto $\\log_2(32) = \\boxed{5}$"
      ]
    },
    {
      tag: "Funciones · Exponenciales",
      q: "Simplifica: $e^{\\ln 7}$",
      a: "7", alt: [],
      steps: [
        "Por definición: $e^{\\ln x} = x$ para todo $x > 0$",
        "Entonces $e^{\\ln 7} = \\boxed{7}$"
      ]
    }
  ],

  "Límites y Continuidad": [
    {
      tag: "Límites · Sustitución directa",
      q: "$\\displaystyle\\lim_{x \\to 3}(x^2 - 2x + 1)$",
      a: "4", alt: [],
      steps: [
        "La función es polinomial, por lo que el límite es la evaluación directa",
        "$\\lim_{x\\to 3}(x^2-2x+1) = (3)^2 - 2(3) + 1$",
        "$= 9 - 6 + 1 = \\boxed{4}$"
      ]
    },
    {
      tag: "Límites · Forma indeterminada",
      q: "$\\displaystyle\\lim_{x \\to 2} \\frac{x^2 - 4}{x - 2}$",
      a: "4", alt: [],
      steps: [
        "Si sustituimos $x=2$ obtenemos $\\frac{0}{0}$ (indeterminado)",
        "Factorizamos el numerador: $x^2-4 = (x+2)(x-2)$",
        "$\\frac{(x+2)(x-2)}{x-2} = x+2$ (para $x\\neq 2$)",
        "$\\lim_{x\\to 2}(x+2) = 2+2 = \\boxed{4}$"
      ]
    },
    {
      tag: "Límites · Regla de L'Hôpital",
      q: "$\\displaystyle\\lim_{x \\to 0} \\frac{\\sin x}{x}$",
      a: "1", alt: [],
      steps: [
        "Forma $\\frac{0}{0}$, aplicamos L'Hôpital: derivamos numerador y denominador",
        "$\\lim_{x\\to 0}\\frac{\\cos x}{1}$",
        "$= \\cos(0) = \\boxed{1}$",
        "Nota: este es uno de los límites fundamentales del cálculo"
      ]
    },
    {
      tag: "Límites · Infinito",
      q: "$\\displaystyle\\lim_{x \\to \\infty} \\frac{3x^2+1}{x^2-5}$",
      a: "3", alt: [],
      steps: [
        "Dividimos numerador y denominador entre $x^2$ (la potencia mayor)",
        "$\\frac{3 + 1/x^2}{1 - 5/x^2}$",
        "Cuando $x\\to\\infty$: $1/x^2 \\to 0$ y $5/x^2 \\to 0$",
        "$= \\frac{3+0}{1-0} = \\boxed{3}$"
      ]
    }
  ],

  "Derivadas": [
    {
      tag: "Derivadas · Regla de la potencia",
      q: "Calcula $\\dfrac{d}{dx}\\left[4x^5 - 3x^2 + 7\\right]$",
      a: "20x^4-6x", alt: ["20x^4 - 6x","20x⁴-6x"],
      steps: [
        "Derivamos término a término usando $\\frac{d}{dx}[x^n]=nx^{n-1}$",
        "$\\frac{d}{dx}[4x^5] = 4 \\cdot 5x^4 = 20x^4$",
        "$\\frac{d}{dx}[-3x^2] = -3 \\cdot 2x = -6x$",
        "$\\frac{d}{dx}[7] = 0$",
        "Resultado: $\\boxed{20x^4 - 6x}$"
      ]
    },
    {
      tag: "Derivadas · Regla del producto",
      q: "Deriva $f(x) = x^2 \\cdot \\sin x$",
      a: "2xsinx+x^2cosx", alt: ["x^2cosx+2xsinx","2x\\sin x+x^2\\cos x"],
      steps: [
        "Regla del producto: $(u \\cdot v)' = u'v + uv'$",
        "$u = x^2 \\Rightarrow u' = 2x$",
        "$v = \\sin x \\Rightarrow v' = \\cos x$",
        "$f'(x) = 2x\\sin x + x^2\\cos x$"
      ]
    },
    {
      tag: "Derivadas · Regla de la cadena",
      q: "Deriva $f(x) = (3x+1)^4$",
      a: "12(3x+1)^3", alt: ["12(3x+1)³"],
      steps: [
        "Regla de la cadena: $[g(h(x))]' = g'(h(x)) \\cdot h'(x)$",
        "$g(u) = u^4 \\Rightarrow g'(u) = 4u^3$",
        "$h(x) = 3x+1 \\Rightarrow h'(x) = 3$",
        "$f'(x) = 4(3x+1)^3 \\cdot 3 = \\boxed{12(3x+1)^3}$"
      ]
    },
    {
      tag: "Derivadas · Trigonométricas",
      q: "Calcula $\\dfrac{d}{dx}[\\cos(x^2)]$",
      a: "-2xsin(x^2)", alt: ["-2x\\sin(x^2)","-2xsin x^2"],
      steps: [
        "Aplicamos regla de la cadena: $\\frac{d}{dx}[\\cos(u)] = -\\sin(u)\\cdot u'$",
        "Aquí $u = x^2 \\Rightarrow u' = 2x$",
        "$\\frac{d}{dx}[\\cos(x^2)] = -\\sin(x^2)\\cdot 2x$",
        "$= \\boxed{-2x\\sin(x^2)}$"
      ]
    },
    {
      tag: "Derivadas · Máximos y mínimos",
      q: "La función $f(x)=x^2-4x+3$ tiene un mínimo en $x=$",
      a: "2", alt: [],
      steps: [
        "Para encontrar extremos, hacemos $f'(x) = 0$",
        "$f'(x) = 2x - 4 = 0$",
        "$2x = 4 \\Rightarrow x = \\boxed{2}$",
        "Verificamos: $f''(x)=2>0$ → mínimo ✓"
      ]
    },
    {
      tag: "Derivadas · Derivación implícita",
      q: "Si $x^2 + y^2 = 25$, ¿cuánto vale $\\dfrac{dy}{dx}$?",
      a: "-x/y", alt: ["-x/y","−x/y"],
      steps: [
        "Derivamos implícitamente ambos lados respecto a $x$",
        "$\\frac{d}{dx}[x^2] + \\frac{d}{dx}[y^2] = \\frac{d}{dx}[25]$",
        "$2x + 2y\\frac{dy}{dx} = 0$",
        "$\\frac{dy}{dx} = \\boxed{-\\frac{x}{y}}$"
      ]
    }
  ],

  "La Diferencial": [
    {
      tag: "Diferencial · Aproximación lineal",
      q: "Si $f(x)=x^3$, calcula $df$ en términos de $dx$",
      a: "3x^2 dx", alt: ["3x²dx","3x^2dx"],
      steps: [
        "La diferencial se define como $df = f'(x)\\,dx$",
        "Calculamos $f'(x) = 3x^2$",
        "Por tanto: $df = \\boxed{3x^2\\,dx}$"
      ]
    },
    {
      tag: "Diferencial · Aproximación",
      q: "Usa la diferencial para aproximar $\\sqrt{4.1}$. El resultado es aproximadamente",
      a: "2.025", alt: ["2.025"],
      steps: [
        "Sea $f(x)=\\sqrt{x}$, conocemos $f(4)=2$",
        "$f'(x)=\\frac{1}{2\\sqrt{x}}$, entonces $f'(4)=\\frac{1}{4}$",
        "Aproximación: $f(4.1) \\approx f(4) + f'(4)\\cdot\\Delta x$",
        "$= 2 + \\frac{1}{4}(0.1) = 2 + 0.025 = \\boxed{2.025}$"
      ]
    }
  ],

  "Integral Indefinida": [
    {
      tag: "Integral · Potencia",
      q: "$\\displaystyle\\int 6x^2\\,dx$",
      a: "2x^3+C", alt: ["2x^3+c","2x³+C","2x³+c"],
      steps: [
        "Regla: $\\int x^n\\,dx = \\frac{x^{n+1}}{n+1} + C$",
        "$\\int 6x^2\\,dx = 6 \\cdot \\frac{x^3}{3} + C$",
        "$= \\boxed{2x^3 + C}$"
      ]
    },
    {
      tag: "Integral · Sustitución",
      q: "$\\displaystyle\\int 2x(x^2+1)^3\\,dx$",
      a: "(x^2+1)^4/4+C", alt: ["(x²+1)⁴/4+C","((x^2+1)^4)/4+C"],
      steps: [
        "Sustitución: sea $u = x^2+1$, entonces $du = 2x\\,dx$",
        "La integral se convierte en: $\\int u^3\\,du$",
        "$= \\frac{u^4}{4} + C$",
        "Regresamos a $x$: $\\boxed{\\frac{(x^2+1)^4}{4} + C}$"
      ]
    },
    {
      tag: "Integral · Por partes",
      q: "$\\displaystyle\\int x\\,e^x\\,dx$ = $xe^x - e^x + C$. ¿Qué técnica se usa?",
      a: "por partes", alt: ["integración por partes","partes"],
      steps: [
        "Se usa integración por partes: $\\int u\\,dv = uv - \\int v\\,du$",
        "Elegimos $u = x \\Rightarrow du = dx$",
        "$dv = e^x\\,dx \\Rightarrow v = e^x$",
        "$\\int xe^x\\,dx = xe^x - \\int e^x\\,dx = xe^x - e^x + C$"
      ]
    },
    {
      tag: "Integral · Trigonométrica",
      q: "$\\displaystyle\\int \\sin(x)\\,dx$",
      a: "-cos(x)+C", alt: ["-cosx+C","-cos x+C","-\\cos(x)+C","-cos(x)+c"],
      steps: [
        "La integral de $\\sin(x)$ es una fórmula estándar",
        "$\\int \\sin(x)\\,dx = -\\cos(x) + C$",
        "Verificación: $\\frac{d}{dx}[-\\cos x] = \\sin x$ ✓"
      ]
    }
  ],

  "Integral Definida": [
    {
      tag: "Integral Definida · Teorema Fundamental",
      q: "$\\displaystyle\\int_0^3 x^2\\,dx$",
      a: "9", alt: [],
      steps: [
        "Antiderivada de $x^2$ es $\\frac{x^3}{3}$",
        "Aplicamos el Teorema Fundamental: $\\left[\\frac{x^3}{3}\\right]_0^3$",
        "$= \\frac{3^3}{3} - \\frac{0^3}{3}$",
        "$= \\frac{27}{3} - 0 = \\boxed{9}$"
      ]
    },
    {
      tag: "Integral Definida · Área",
      q: "Área bajo $f(x)=2x$ de $x=0$ a $x=4$",
      a: "16", alt: [],
      steps: [
        "$A = \\int_0^4 2x\\,dx = \\left[x^2\\right]_0^4$",
        "$= 4^2 - 0^2 = 16 - 0$",
        "$= \\boxed{16}$"
      ]
    },
    {
      tag: "Integral Definida · Propiedades",
      q: "Si $\\int_0^5 f(x)\\,dx = 10$ y $\\int_0^3 f(x)\\,dx = 4$, ¿cuánto es $\\int_3^5 f(x)\\,dx$?",
      a: "6", alt: [],
      steps: [
        "Propiedad de aditividad del intervalo:",
        "$\\int_0^5 = \\int_0^3 + \\int_3^5$",
        "$\\int_3^5 = \\int_0^5 - \\int_0^3 = 10 - 4$",
        "$= \\boxed{6}$"
      ]
    }
  ],

  // ── ÁLGEBRA LINEAL ──────────────────────────────────

  "Matrices y Determinantes": [
    {
      tag: "Matrices · Suma",
      q: "$A=\\begin{pmatrix}1&2\\\\3&4\\end{pmatrix}$, $B=\\begin{pmatrix}5&6\\\\7&8\\end{pmatrix}$. El elemento $a_{12}$ de $A+B$ es:",
      a: "8", alt: [],
      steps: [
        "Sumamos elemento a elemento",
        "$(A+B)_{12} = A_{12} + B_{12} = 2 + 6$",
        "$= \\boxed{8}$"
      ]
    },
    {
      tag: "Matrices · Multiplicación",
      q: "$A=\\begin{pmatrix}1&0\\\\0&2\\end{pmatrix}$, $B=\\begin{pmatrix}3\\\\4\\end{pmatrix}$. El elemento $(AB)_{21}$ es:",
      a: "8", alt: [],
      steps: [
        "$(AB)_{21}$ = fila 2 de $A$ · columna 1 de $B$",
        "Fila 2 de $A$: $(0,\\;2)$",
        "Columna 1 de $B$: $(3,\\;4)$",
        "$(0)(3)+(2)(4) = 0+8 = \\boxed{8}$"
      ]
    },
    {
      tag: "Determinantes · 2×2",
      q: "$\\det\\begin{pmatrix}3&1\\\\2&4\\end{pmatrix}$",
      a: "10", alt: [],
      steps: [
        "Para una matriz $2\\times 2$: $\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix} = ad - bc$",
        "$\\det = (3)(4) - (1)(2)$",
        "$= 12 - 2 = \\boxed{10}$"
      ]
    },
    {
      tag: "Determinantes · 3×3",
      q: "$\\det\\begin{pmatrix}1&0&0\\\\0&2&0\\\\0&0&3\\end{pmatrix}$",
      a: "6", alt: [],
      steps: [
        "Es una matriz diagonal, el determinante es el producto de la diagonal",
        "$\\det = 1 \\cdot 2 \\cdot 3$",
        "$= \\boxed{6}$"
      ]
    },
    {
      tag: "Matrices · Inversa 2×2",
      q: "Si $A=\\begin{pmatrix}2&1\\\\1&1\\end{pmatrix}$, ¿cuánto es $\\det(A)$?",
      a: "1", alt: [],
      steps: [
        "$\\det(A) = (2)(1)-(1)(1)$",
        "$= 2 - 1 = \\boxed{1}$",
        "Como $\\det\\neq 0$, la matriz sí tiene inversa"
      ]
    }
  ],

  "Sistemas de Ecuaciones": [
    {
      tag: "Sistemas · Eliminación",
      q: "Resuelve: $\\begin{cases}x + y = 5\\\\ x - y = 1\\end{cases}$. Valor de $x$:",
      a: "3", alt: [],
      steps: [
        "Sumamos las dos ecuaciones:",
        "$(x+y)+(x-y) = 5+1$",
        "$2x = 6 \\Rightarrow x = \\boxed{3}$",
        "Verificamos: $y = 5-3 = 2$"
      ]
    },
    {
      tag: "Sistemas · Regla de Cramer",
      q: "Para $\\begin{cases}2x+y=7\\\\ x+3y=11\\end{cases}$, el determinante del sistema $D$ es:",
      a: "5", alt: [],
      steps: [
        "$D = \\det\\begin{pmatrix}2&1\\\\1&3\\end{pmatrix}$",
        "$= (2)(3)-(1)(1) = 6-1$",
        "$= \\boxed{5}$"
      ]
    },
    {
      tag: "Sistemas · Gauss-Jordan",
      q: "La matriz aumentada $\\begin{pmatrix}1&0&|&3\\\\0&1&|&5\\end{pmatrix}$ indica que $x=$",
      a: "3", alt: [],
      steps: [
        "Una matriz en forma escalonada reducida nos da directamente la solución",
        "Fila 1: $1x + 0y = 3 \\Rightarrow x = \\boxed{3}$",
        "Fila 2: $0x + 1y = 5 \\Rightarrow y = 5$"
      ]
    }
  ],

  "Espacio Euclidiano": [
    {
      tag: "Geometría Analítica · Distancia",
      q: "Distancia entre $P_1(1,2)$ y $P_2(4,6)$",
      a: "5", alt: [],
      steps: [
        "$d = \\sqrt{(x_2-x_1)^2+(y_2-y_1)^2}$",
        "$= \\sqrt{(4-1)^2+(6-2)^2}$",
        "$= \\sqrt{9+16} = \\sqrt{25}$",
        "$= \\boxed{5}$"
      ]
    },
    {
      tag: "Geometría Analítica · Pendiente",
      q: "Pendiente de la recta que pasa por $(2,3)$ y $(6,7)$",
      a: "1", alt: [],
      steps: [
        "$m = \\frac{y_2-y_1}{x_2-x_1}$",
        "$= \\frac{7-3}{6-2} = \\frac{4}{4}$",
        "$= \\boxed{1}$"
      ]
    },
    {
      tag: "Geometría Analítica · Punto Medio",
      q: "Punto medio entre $(0,0)$ y $(8,6)$. La coordenada $x$ del punto medio es:",
      a: "4", alt: [],
      steps: [
        "$M = \\left(\\frac{x_1+x_2}{2},\\; \\frac{y_1+y_2}{2}\\right)$",
        "$M_x = \\frac{0+8}{2} = \\boxed{4}$",
        "$M_y = \\frac{0+6}{2} = 3$"
      ]
    }
  ],

  "Espacio Vectorial": [
    {
      tag: "Vectores · Magnitud",
      q: "Magnitud del vector $\\vec{v} = (3, 4)$",
      a: "5", alt: [],
      steps: [
        "$|\\vec{v}| = \\sqrt{v_x^2 + v_y^2}$",
        "$= \\sqrt{3^2+4^2} = \\sqrt{9+16}$",
        "$= \\sqrt{25} = \\boxed{5}$"
      ]
    },
    {
      tag: "Vectores · Producto punto",
      q: "$\\vec{u}=(2,3)$ y $\\vec{v}=(4,1)$. Calcula $\\vec{u}\\cdot\\vec{v}$",
      a: "11", alt: [],
      steps: [
        "$\\vec{u}\\cdot\\vec{v} = u_x v_x + u_y v_y$",
        "$= (2)(4)+(3)(1)$",
        "$= 8+3 = \\boxed{11}$"
      ]
    },
    {
      tag: "Vectores · Transformación Lineal",
      q: "Sea $T(x,y)=(2x, 3y)$. ¿Cuánto es $T(1,2)$ en su segunda componente?",
      a: "6", alt: [],
      steps: [
        "Aplicamos la transformación: $T(1,2)=(2(1), 3(2))$",
        "$= (2, 6)$",
        "La segunda componente es $\\boxed{6}$"
      ]
    }
  ]
};

// ══════════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════════
let activeTopic = null;
let pool = [];
let current = null;
let answered = false;
let stats = {c:0, w:0, t:0};
let history = [];
let sessionN = 0;

// ══════════════════════════════════════════════════════
//  INICIALIZAR BOTONES DE TEMA
// ══════════════════════════════════════════════════════
function initTopics() {
  const grid = document.getElementById('topic-grid');
  const icons = {
    "Funciones y Variables":"📈",
    "Límites y Continuidad":"🔍",
    "Derivadas":"📐",
    "La Diferencial":"Δ",
    "Integral Indefinida":"∫",
    "Integral Definida":"🔲",
    "Matrices y Determinantes":"🧮",
    "Sistemas de Ecuaciones":"⚙️",
    "Espacio Euclidiano":"📍",
    "Espacio Vectorial":"➡️"
  };
  Object.keys(TOPICS).forEach(t => {
    const b = document.createElement('button');
    b.className = 'topic-btn';
    b.innerHTML = `${icons[t]||'▸'} ${t}`;
    b.onclick = () => selectTopic(t, b);
    grid.appendChild(b);
  });
}

function selectTopic(t, btn) {
  activeTopic = t;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  pool = [...TOPICS[t]].sort(() => Math.random()-.5);
  sessionN = 0;
  document.getElementById('ans').disabled = false;
  document.getElementById('btn-check').disabled = false;
  nextEx();
}

// ══════════════════════════════════════════════════════
//  EJERCICIO
// ══════════════════════════════════════════════════════
function nextEx() {
  if (!activeTopic) return;
  if (pool.length === 0) pool = [...TOPICS[activeTopic]].sort(() => Math.random()-.5);
  current = pool.pop();
  answered = false;
  sessionN++;

  document.getElementById('ex-tag').textContent = current.tag;
  document.getElementById('ex-q').innerHTML = current.q;
  const inp = document.getElementById('ans');
  inp.value = ''; inp.className = 'answer-input'; inp.disabled = false;
  document.getElementById('fb').className = 'feedback';
  document.getElementById('btn-row').style.display = 'none';

  updateProgress();
  if (window.MathJax) MathJax.typesetPromise([document.getElementById('ex-q')]);
}

function norm(s) {
  return s.toLowerCase().replace(/\s/g,'')
    .replace(/×/g,'*').replace(/÷/g,'/');
}

function checkAns() {
  if (answered || !current) return;
  const inp = document.getElementById('ans');
  const val = inp.value.trim();
  if (!val) return;

  answered = true; inp.disabled = true;
  stats.t++;

  const correct =
    norm(val) === norm(current.a) ||
    current.alt.some(x => norm(val) === norm(x));

  const fb = document.getElementById('fb');
  const fbTitle = document.getElementById('fb-title');
  const fbSteps = document.getElementById('fb-steps');

  if (correct) {
    stats.c++;
    inp.classList.add('correct');
    fb.className = 'feedback show-correct';
    fbTitle.innerHTML = '✓ ¡Correcto!';
  } else {
    stats.w++;
    inp.classList.add('wrong');
    fb.className = 'feedback show-wrong';
    fbTitle.innerHTML = `✗ Incorrecto — la respuesta es: <code>${current.a}</code>`;
  }

  fbSteps.innerHTML = current.steps.map((s,i)=>`
    <div class="step">
      <span class="step-num">paso ${i+1}</span>
      <span class="step-text">${s}</span>
    </div>`).join('');

  addHistory(correct, val);
  updateScores();
  document.getElementById('btn-row').style.display = 'flex';
  if (window.MathJax) MathJax.typesetPromise([fb]);
}

function showSolution() {
  if (answered) { nextEx(); return; }
  answered = true;
  stats.t++; stats.w++;
  const inp = document.getElementById('ans');
  inp.disabled = true; inp.classList.add('wrong');
  const fb = document.getElementById('fb');
  fb.className = 'feedback show-wrong';
  document.getElementById('fb-title').innerHTML =
    `Solución completa (respuesta: <code>${current.a}</code>)`;
  document.getElementById('fb-steps').innerHTML =
    current.steps.map((s,i)=>`
      <div class="step">
        <span class="step-num">paso ${i+1}</span>
        <span class="step-text">${s}</span>
      </div>`).join('');
  addHistory(false,'(solución)');
  updateScores();
  document.getElementById('btn-row').style.display = 'flex';
  if (window.MathJax) MathJax.typesetPromise([fb]);
}

// ══════════════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════════════
function updateScores() {
  document.getElementById('sc').textContent = stats.c;
  document.getElementById('sw').textContent = stats.w;
  document.getElementById('st').textContent = stats.t;
}

function updateProgress() {
  const pct = Math.min(((sessionN-1)%10+1)/10*100,100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-txt').textContent = `${(sessionN-1)%10+1} / 10`;
}

function addHistory(ok, ans) {
  history.unshift({ok, q:current.q, ans, exp:current.a});
  if (history.length > 7) history.pop();
  const list = document.getElementById('hist-list');
  list.innerHTML = history.map(h=>`
    <div class="hist-item ${h.ok?'hc':'hw'}">
      <span>${h.ok?'✅':'❌'}</span>
      <span class="hist-q">${h.q}</span>
      <span class="hist-a">${h.ok ? h.ans : h.exp}</span>
    </div>`).join('');
  if (window.MathJax) MathJax.typesetPromise([list]);
}

// Enter key
document.getElementById('ans').addEventListener('keydown', e => {
  if (e.key==='Enter') { if(!answered) checkAns(); else nextEx(); }
});

// Init
initTopics();
</script>
